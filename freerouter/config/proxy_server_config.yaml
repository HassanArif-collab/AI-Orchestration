# FreeRouter Configuration
# ------------------------

# Server Settings
host: "0.0.0.0"
port: 8000
allowed_origins: "*"  # Set via ALLOWED_ORIGINS environment variable

# Authentication
# Set FREEROUTER_API_KEY environment variable to enable authentication

# Provider Settings
# Set OLLAMA_API_KEY to use an API key with your Ollama instance
api_key_required: false # Set to true and provide FREEROUTER_API_KEY in .env to enable

# Provider Specifics
ollama_api_key: ""    # Optional: Provide if your Ollama instance requires an API key

# LiteLLM Configuration
model_list:
  # ============================================================================
  # FAST MODELS - For simple chat and quick responses
  # Priority: Local Ollama > Groq > OpenRouter Free
  # ============================================================================

  - model_name: free-router/fast
    litellm_params:
      model: "ollama/qwen2.5:7b"
      api_base: "http://localhost:11434"
      timeout: 30
    model_info:
      description: "Fast free model - Qwen 2.5 7B via Ollama (local)"
      max_tokens: 32000
      supports_vision: false

  - model_name: free-router/fast-groq
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 60
    model_info:
      description: "Fast free model - Llama 3.3 70B via Groq"
      max_tokens: 8192
      supports_vision: false

  - model_name: free-router/fast-openrouter
    litellm_params:
      model: "openrouter/meta-llama/llama-3.3-70b-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60
    model_info:
      description: "Fast free model - Llama 3.3 70B via OpenRouter"
      max_tokens: 8192
      supports_vision: false

  # ============================================================================
  # CODING MODELS - For code generation and debugging
  # Priority: Local Ollama > DeepSeek via OpenRouter > Groq
  # ============================================================================

  - model_name: free-router/coder
    litellm_params:
      model: "ollama/qwen2.5-coder:32b"
      api_base: "http://localhost:11434"
      timeout: 120
    model_info:
      description: "Best free coder - Qwen 2.5 Coder 32B via Ollama (local)"
      max_tokens: 32000
      supports_vision: false

  - model_name: free-router/coder-deepseek
    litellm_params:
      model: "openrouter/deepseek/deepseek-chat:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 120
    model_info:
      description: "Coding model - DeepSeek Chat via OpenRouter"
      max_tokens: 64000
      supports_vision: false

  - model_name: free-router/coder-qwen
    litellm_params:
      model: "openrouter/qwen/qwen-2.5-coder-32b-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 120
    model_info:
      description: "Coding model - Qwen 2.5 Coder 32B via OpenRouter"
      max_tokens: 32000
      supports_vision: false

  - model_name: free-router/coder-groq
    litellm_params:
      model: "groq/qwen-2.5-coder-32b"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 60
    model_info:
      description: "Coding model - Qwen 2.5 Coder via Groq"
      max_tokens: 8192
      supports_vision: false

  # ============================================================================
  # REASONING MODELS - For complex reasoning and analysis
  # Priority: DeepSeek R1 > Local models
  # ============================================================================

  - model_name: free-router/reasoning
    litellm_params:
      model: "openrouter/deepseek/deepseek-r1:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 300
    model_info:
      description: "Reasoning model - DeepSeek R1 via OpenRouter (free)"
      max_tokens: 16000
      supports_vision: false

  - model_name: free-router/reasoning-ollama
    litellm_params:
      model: "ollama/deepseek-r1:8b"
      api_base: "http://localhost:11434"
      timeout: 180
    model_info:
      description: "Reasoning model - DeepSeek R1 8B via Ollama (local)"
      max_tokens: 32000
      supports_vision: false

  # ============================================================================
  # SMART MODELS - Balanced intelligence for general tasks
  # Priority: Local Ollama > Groq > OpenRouter Free
  # ============================================================================

  - model_name: free-router/smart
    litellm_params:
      model: "ollama/qwen2.5:14b"
      api_base: "http://localhost:11434"
      timeout: 60
    model_info:
      description: "Smart model - Qwen 2.5 14B via Ollama (local)"
      max_tokens: 32000
      supports_vision: false

  - model_name: free-router/smart-groq
    litellm_params:
      model: "groq/qwen-2.5-32b"
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 60
    model_info:
      description: "Smart model - Qwen 2.5 32B via Groq"
      max_tokens: 8192
      supports_vision: false

  - model_name: free-router/smart-openrouter
    litellm_params:
      model: "openrouter/qwen/qwen-2.5-32b-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60
    model_info:
      description: "Smart model - Qwen 2.5 32B via OpenRouter"
      max_tokens: 32000
      supports_vision: false

  # ============================================================================
  # VISION MODELS - For image understanding
  # Priority: Local Ollama > OpenRouter Free
  # ============================================================================

  - model_name: free-router/vision
    litellm_params:
      model: "ollama/llama3.2-vision:11b"
      api_base: "http://localhost:11434"
      timeout: 120
    model_info:
      description: "Vision model - Llama 3.2 Vision 11B via Ollama (local)"
      max_tokens: 8192
      supports_vision: true

  - model_name: free-router/vision-openrouter
    litellm_params:
      model: "openrouter/meta-llama/llama-3.2-11b-vision-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 120
    model_info:
      description: "Vision model - Llama 3.2 11B Vision via OpenRouter"
      max_tokens: 8192
      supports_vision: true

  - model_name: free-router/vision-qwen
    litellm_params:
      model: "ollama/qwen2.5-vl:7b"
      api_base: "http://localhost:11434"
      timeout: 120
    model_info:
      description: "Vision model - Qwen 2.5 VL 7B via Ollama (local)"
      max_tokens: 32000
      supports_vision: true

  # ============================================================================
  # LONG CONTEXT MODELS - For processing large documents
  # Priority: Local Ollama > OpenRouter Free
  # ============================================================================

  - model_name: free-router/long-context
    litellm_params:
      model: "ollama/qwen2.5:32b"
      api_base: "http://localhost:11434"
      timeout: 300
    model_info:
      description: "Long context - Qwen 2.5 32B via Ollama (local, 32k context)"
      max_tokens: 32000
      supports_vision: false

  - model_name: free-router/long-context-128k
    litellm_params:
      model: "openrouter/meta-llama/llama-3.3-70b-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 300
    model_info:
      description: "Long context - Llama 3.3 70B via OpenRouter"
      max_tokens: 128000
      supports_vision: false

  # ============================================================================
  # BALANCED - Default routing target
  # ============================================================================

  - model_name: free-router/balanced
    litellm_params:
      model: "ollama/qwen2.5:7b"
      api_base: "http://localhost:11434"
      timeout: 60
    model_info:
      description: "Balanced default - Qwen 2.5 7B via Ollama (local)"
      max_tokens: 32000
      supports_vision: false

  # ============================================================================
  # FALLBACK MODELS - Last resort when free tiers exhausted
  # Cheapest paid options as absolute fallback
  # ============================================================================

  - model_name: free-router/fallback-cheap
    litellm_params:
      model: "openrouter/deepseek/deepseek-chat"
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 60
    model_info:
      description: "Fallback - DeepSeek Chat (very cheap)"
      max_tokens: 64000
      supports_vision: false

# ============================================================================
# ROUTING CONFIGURATION
# ============================================================================

router_settings:
  routing_strategy: "simple-shuffle"  # Shuffle through available models
  num_retries: 3
  timeout: 300
  retry_after: 10  # Seconds to wait before retry

# ============================================================================
# FALLBACKS - Automatic failover between models
# ============================================================================

fallbacks:
  # Fast models fallback chain
  - model: "free-router/fast"
    fallbacks:
      - "free-router/fast-groq"
      - "free-router/fast-openrouter"
      - "free-router/smart"

  # Coder fallback chain
  - model: "free-router/coder"
    fallbacks:
      - "free-router/coder-deepseek"
      - "free-router/coder-qwen"
      - "free-router/coder-groq"
      - "free-router/smart"

  # Reasoning fallback chain
  - model: "free-router/reasoning"
    fallbacks:
      - "free-router/reasoning-ollama"
      - "free-router/coder"

  # Smart fallback chain
  - model: "free-router/smart"
    fallbacks:
      - "free-router/smart-groq"
      - "free-router/smart-openrouter"
      - "free-router/fast"

  # Vision fallback chain
  - model: "free-router/vision"
    fallbacks:
      - "free-router/vision-openrouter"
      - "free-router/vision-qwen"
      - "free-router/smart"

  # Long context fallback chain
  - model: "free-router/long-context"
    fallbacks:
      - "free-router/long-context-128k"
      - "free-router/smart"

  # Balanced fallback chain
  - model: "free-router/balanced"
    fallbacks:
      - "free-router/smart-groq"
      - "free-router/smart-openrouter"
      - "free-router/fast"

# ============================================================================
# RATE LIMITING & COST TRACKING
# ============================================================================

rate_limit:
  rpm: 100  # Requests per minute
  tpm: 100000  # Tokens per minute

# ============================================================================
# GENERAL SETTINGS
# ============================================================================

general_settings:
  master_key: "os.environ/FREEROUTER_API_KEY"  # Optional API key for the proxy
  database_url: null  # Set to track costs over time
  store_model_in_db: false

# ============================================================================
# LOGGING
# ============================================================================

litellm_settings:
  set_verbose: true
  drop_params: true  # Drop unsupported params instead of erroring
  success_callback: []
  failure_callback: []

# Logging configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ============================================================================
# SERVER SETTINGS
# ============================================================================

server_settings:
  host: "0.0.0.0"
  port: 4000

  # CORS settings for web access
  cors:
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "*"

  # Health check endpoint
  health_check:
    enabled: true
    path: "/health"

  # API documentation
  docs:
    enabled: true
    path: "/docs"

# ============================================================================
# MODEL GROUPS - For easy reference
# ============================================================================

# These aliases are available:
# free-router/fast      - Fastest response, good for simple chat
# free-router/coder     - Best for coding tasks
# free-router/reasoning - Best for complex reasoning
# free-router/smart     - Balanced intelligence
# free-router/vision    - Image understanding
# free-router/long-context - Large document processing
# free-router/balanced  - Default, balanced choice