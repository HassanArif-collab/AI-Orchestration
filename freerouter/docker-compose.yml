# FreeRouter Docker Compose
# Start with: docker-compose up -d
# Stop with: docker-compose down
# View logs: docker-compose logs -f freerouter

services:
  freerouter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freerouter
    ports:
      - "4000:4000"
    volumes:
      # Persist configuration
      - ./config:/app/config:ro
      # Optional: Persist Ollama models cache
      # - ollama_cache:/root/.ollama
    env_file:
      - .env
    environment:
      - FREEROUTER_CONFIG=/app/config/proxy_server_config.yaml
      # Ollama host for connecting to local Ollama
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - freerouter-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Run Ollama in Docker as well
  # Uncomment to use Ollama container instead of host Ollama
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_cache:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - freerouter-network
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  # Optional: LiteLLM UI for monitoring
  # liteui:
  #   image: ghcr.io/berriai/litellm-ui:latest
  #   container_name: liteui
  #   ports:
  #     - "8501:8501"
  #   environment:
  #     - LITELLM_PROXY_URL=http://freerouter:4000
  #   depends_on:
  #     - freerouter
  #   networks:
  #     - freerouter-network

networks:
  freerouter-network:
    driver: bridge

volumes:
  ollama_cache:
    driver: local